<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <title>RMS-Rej Comprehensive Site</title>
    <link rel="icon" href="../files/images/rms-logo-rotating.svg">
    <link href="../css/bootstrap.min.css" rel="stylesheet">
    <link href="../css/glass-navbar.css" rel="stylesheet">
    <link href="../css/dark-mode.css" rel="stylesheet">
    <script src="../js/bootstrap.bundle.min.js"></script>
    <script src="../js/theme-switcher.js"></script>
    <style>
        .btn {
            border-radius: 20px;
        }
        .navbar-toggler {
            border-radius: 20px;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
                filter: blur(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
                filter: blur(0);
            }
        }
        /* 鏃嬭浆杩涘満鍔ㄧ敾 */
        @keyframes spinIn {
            from {
                opacity: 0;
                transform: rotate(-360deg) scale(0.5);
                filter: blur(10px);
            }
            to {
                opacity: 1;
                transform: rotate(0deg) scale(1);
                filter: blur(0);
            }
        }
        /* 鎸佺画鎱㈤€熸棆杞姩鐢?*/
        @keyframes slowSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .nav-item {
            opacity: 0;
            animation: fadeInUp 0.5s ease forwards;
        }
        .nav-item:nth-child(1) {
            animation-delay: 0.1s;
        }
        .nav-item:nth-child(2) {
            animation-delay: 0.2s;
        }
        .nav-item:nth-child(3) {
            animation-delay: 0.3s;
        }
        .nav-item:nth-child(4) {
            animation-delay: 0.4s;
        }
        .nav-item:nth-child(5) {
            animation-delay: 0.5s;
        }
        .nav-item:nth-child(6) {
            animation-delay: 0.6s;
        }
        .nav-item:nth-child(7) {
            animation-delay: 0.7s;
        }
        /* 椤甸潰鍐呭鍖哄潡鍔ㄧ敾 */
        body > div.content-section {
            opacity: 0;
            animation: fadeInUp 0.6s ease forwards;
        }
        /* 涓烘瘡涓唴瀹瑰尯鍧楄缃笉鍚岀殑鍔ㄧ敾寤惰繜 */
        body > div.content-section:nth-child(2) {
            animation-delay: 0.8s;
        }
        body > div.content-section:nth-child(3) {
            animation-delay: 1.0s;
        }
        body > div.content-section:nth-child(4) {
            animation-delay: 1.2s;
        }
        /* 图标进入动画 */
        .icon-container {
            opacity: 0;
            animation: fadeInUp 0.6s ease forwards;
            height: 50px;
        }
        .icon-container:nth-child(1) {
            animation-delay: 1.2s;
        }
        .icon-container:nth-child(2) {
            animation-delay: 1.4s;
        }
    </style>
</head>
<body>
<div id="navbar-container" class="sticky-top"></div>
<script src="../js/navbar-loader.js"></script>
<script src="../js/banner-loader.js"></script>
<div class="p-5 mb-4 bg-body-tertiary rounded-3 content-section">
    <div class="container-fluid py-5">
        <img alt="" height="150" src="../files/images/rms-logo.svg" width="150" style="opacity: 0; animation: spinIn 1s ease-out forwards 1.2s, slowSpin 10s linear infinite 2.2s;"/>
        <h1 class="display-5 fw-bold">Welcome to Rej Comprehensive Site</h1>
        <p class="col-md-8 fs-4"><span id="hero-carousel">Here we provide comprehensive Rej information</span></p>
        <a class="btn btn-primary" href="changelogview.html">Update Log(CHANGELOG)</a>
        <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#feedbackModal">
            Provide Feedback
        </button>

        <!-- Feedback Modal -->
        <div class="modal fade" id="feedbackModal" tabindex="-1" aria-labelledby="feedbackModalLabel" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="feedbackModalLabel">Provide Feedback</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <iframe src="https://www.wjx.cn/vm/tom43Pn.aspx#" width="100%" height="100%" frameborder="0" scrolling="auto"></iframe>
                    </div>
                </div>
            </div>
        </div>

        <style>
            /* Modal Animation */
            .modal.fade .modal-dialog {
                transition: transform 0.3s ease-out;
                transform: translateY(-50px);
                max-height: 75vh;
                overflow-y: auto;
            }
            .modal.show .modal-dialog {
                transform: translateY(0);
            }
            /* Ensure modal backdrop doesn't show */
            .modal-backdrop {
                display: none;
            }
            .modal {
                z-index: 1060;
            }
            .modal-content {
                max-height: 70vh;
                overflow-y: auto;
            }
            .modal-body {
                max-height: 60vh;
                overflow-y: auto;
            }
            .modal-body iframe {
                max-height: 100%;
            }
        </style>
    </div>
</div>
    <footer class="mt-5 py-3 bg-light text-center">
    <div class="version-container"></div>
    <div style="display: flex; justify-content: center; gap: 20px; margin: 8px 0;">
        <img src="../files/images/DAEen.png" alt="DAE" class="icon-container">
        <img src="../files/images/MLSen.png" alt="MLS"  class="icon-container">
    </div>
    <a href="licenseview.html">Apache2.0 License
        ——Copyright RejTech 2026</a>
</footer>
<script src="../js/version-loader.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const texts = [
            'Here we provide comprehensive Rej information',
            'Explore unlimited possibilities, discover more wonders',
            'One-stop comprehensive service platform',
            'Latest news, videos, and live streaming all in one place',
            'Grow with Rej, create the future together'
        ];
        
        const carouselElement = document.getElementById('hero-carousel');
        let currentIndex = 0;
        
        function changeText() {
            carouselElement.style.opacity = '0';
            setTimeout(() => {
                currentIndex = (currentIndex + 1) % texts.length;
                carouselElement.textContent = texts[currentIndex];
                carouselElement.style.opacity = '1';
            }, 300);
        }
        
        carouselElement.style.transition = 'opacity 0.3s ease';
        
        setInterval(changeText, 2000);
    });
</script>

</body>
</html>
