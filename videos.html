<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <title>投稿 - 锐机综合站</title>
    <link rel="icon" href="files/images/rms-logo-rotating.svg">
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link href="css/glass-navbar.css" rel="stylesheet">
    <link href="css/dark-mode.css" rel="stylesheet">
    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/language-switcher.js"></script>
    <script src="js/theme-switcher.js"></script>
    <style>
        .btn {
            border-radius: 20px;
        }
        .navbar-toggler {
            border-radius: 20px;
        }
        .navbar {
            z-index: 1030;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
                filter: blur(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
                filter: blur(0);
            }
        }
        .nav-item {
            opacity: 0;
            animation: fadeInUp 0.5s ease forwards;
        }
        .nav-item:nth-child(1) { animation-delay: 0.1s; }
        .nav-item:nth-child(2) { animation-delay: 0.2s; }
        .nav-item:nth-child(3) { animation-delay: 0.3s; }
        .nav-item:nth-child(4) { animation-delay: 0.4s; }
        .nav-item:nth-child(5) { animation-delay: 0.5s; }
        .nav-item:nth-child(6) { animation-delay: 0.6s; }
        .nav-item:nth-child(7) { animation-delay: 0.7s; }
        body > div.content-section {
            opacity: 0;
            animation: fadeInUp 0.6s ease forwards;
        }
        body > div.content-section:nth-child(2) { animation-delay: 0.8s; }
        .bilibili-iframe {
            width: 100%;
            min-height: 1000px;
            border: none;
            margin-top: -100px;
        }
        .iframe-container {
            position: relative;
            width: 100%;
            overflow: hidden;
            border-radius: 20px;
            height: 900px;
        }
        .iframe-loading {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.9);
            z-index: 10;
            border-radius: 20px;
        }
        .icon-container {
            opacity: 0;
            animation: fadeInUp 0.6s ease forwards;
            height: 50px;
        }
        .icon-container:nth-child(1) {
            animation-delay: 1.2s;
        }
        .icon-container:nth-child(2) {
            animation-delay: 1.4s;
        }
    </style>
</head>
<body>
<div id="navbar-container" class="sticky-top"></div>
<script src="js/navbar-loader.js"></script>

<div class="container mt-5 content-section">
    <h1 class="mb-4">投稿</h1>
    
    <div class="row mb-4">
        <div class="col-md-6">
            <div class="input-group">
                <input type="text" id="search-input" class="form-control" placeholder="搜索视频...">
                <button class="btn btn-primary" id="search-btn">搜索</button>
            </div>
        </div>
        <div class="col-md-6">
            <div class="d-flex gap-2 justify-content-end">
                <a href="https://space.bilibili.com/1162853749" target="_blank" class="btn btn-outline-primary">在B站打开</a>
            </div>
        </div>
    </div>

    <div class="iframe-container">
        <div class="iframe-loading" id="iframe-loading">
            <div class="text-center">
                <div class="spinner-border mb-3" role="status"></div>
                <p>正在加载B站视频列表...</p>
            </div>
        </div>
        <iframe id="bilibili-iframe" class="bilibili-iframe" src="https://space.bilibili.com/1162853749/video" onload="document.getElementById('iframe-loading').style.display='none'"></iframe>
    </div>
</div>

<footer class="mt-5 py-3 bg-light text-center">
    <div class="version-container"></div>
     <div style="display: flex; justify-content: center; gap: 20px; margin: 8px 0;">
        <img src="files/images/DAEcn.png" alt="DAE" class="icon-container">
        <img src="files/images/MLScn.png" alt="MLS" class="icon-container">
    </div>
     <a href="licenseview.html">Apache2.0许可证
        ——版权所有 锐机科技2026</a>
</footer>
<script src="js/version-loader.js"></script>

<script>
    document.getElementById('search-btn').addEventListener('click', () => {
        const search = document.getElementById('search-input').value.trim();
        const iframe = document.getElementById('bilibili-iframe');
        if (search) {
            iframe.src = `https://search.bilibili.com/all?keyword=${encodeURIComponent(search)}&page=1`;
        } else {
            iframe.src = 'https://space.bilibili.com/1162853749/video';
        }
        document.getElementById('iframe-loading').style.display = 'flex';
    });

    document.getElementById('search-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            document.getElementById('search-btn').click();
        }
    });
</script>

</body>
</html>
