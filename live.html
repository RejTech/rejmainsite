<!DOCTYPE html>
<html>
<head>

    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <title>RMS-锐机直播</title>
    <link rel="icon" href="files/images/rms-logo-rotating.svg">
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link href="css/glass-navbar.css" rel="stylesheet">
    <link href="css/dark-mode.css" rel="stylesheet">
    <link href="css/cyan-theme.css" rel="stylesheet">
    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/theme-switcher.js"></script>
    <style>
        .btn {
            border-radius: 20px;
        }
        .navbar-toggler {
            border-radius: 20px;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
                filter: blur(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
                filter: blur(0);
            }
        }
        .nav-item {
            opacity: 0;
            animation: fadeInUp 0.5s ease forwards;
        }
        .nav-item:nth-child(1) {
            animation-delay: 0.1s;
        }
        .nav-item:nth-child(2) {
            animation-delay: 0.2s;
        }
        .nav-item:nth-child(3) {
            animation-delay: 0.3s;
        }
        .nav-item:nth-child(4) {
            animation-delay: 0.4s;
        }
        .nav-item:nth-child(5) {
            animation-delay: 0.5s;
        }
        .nav-item:nth-child(6) {
            animation-delay: 0.6s;
        }
        .nav-item:nth-child(7) {
            animation-delay: 0.7s;
        }
        /* 椤甸潰鍐呭鍖哄潡鍔ㄧ敾 */
        body > div.content-section {
            opacity: 0;
            animation: fadeInUp 0.6s ease forwards;
        }
        body > div.content-section:nth-child(2) {
            animation-delay: 0.8s;
        }
        body > div.content-section:nth-child(3) {
            animation-delay: 1.0s;
        }
        .live-container {
            width: 50%;
            margin: 0 auto;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .live-container iframe {
            width: 100%;
            aspect-ratio: 16/9;
            border: none;
            opacity: 0;
            animation: fadeInUp 0.6s ease forwards;
            animation-delay: 1.2s;
        }
        /* 图标进入动画 */
        .icon-container {
            opacity: 0;
            animation: fadeInUp 0.6s ease forwards;
            height: 50px;
        }
        .icon-container:nth-child(1) {
            animation-delay: 1.2s;
        }
        .icon-container:nth-child(2) {
            animation-delay: 1.4s;
        }
    </style>

</head>
<body>
<div id="navbar-container" class="sticky-top"></div>
<script src="js/navbar-loader.js"></script>
<div class="p-5 mb-4 bg-body-tertiary rounded-3 content-section">
    <div class="container-fluid py-5">
        <img alt="" height="100" src="files/images/rms-logo.svg" width="100"/>
        <h1 class="display-5 fw-bold">锐机直播</h1>
        <p class="col-md-8 fs-4">这里为你提供与Bilibili同步的直播</p>
    </div>
</div>
<div class="live-container">
    <iframe src="https://www.bilibili.com/blackboard/live/live-mobile-playerV3.html?roomId=26504347&danmaku=1"></iframe>
</div>

<footer class="mt-5 py-3 bg-light text-center">
    <div class="version-container"></div>
     <div style="display: flex; justify-content: center; gap: 20px; margin: 8px 0;">
        <img src="files/images/DAEcn.png" alt="DAE" class="icon-container">
        <img src="files/images/MLScn.png" alt="MLS" class="icon-container">
    </div>
     <a href="licenseview.html">Apache2.0许可证
        ——版权所有 锐机科技2026</a>
</footer>
<script src="js/version-loader.js"></script>
</body>
</html>
